site_name: CellCounter
site_url: https://tlee08.github.io/cellcounter/
repo_url: https://github.com/tlee08/cellcounter

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../]
          import:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://pandas.pydata.org/docs/objects.inv
            - https://docs.cupy.dev/en/stable/objects.inv
            - https://docs.dask.org/en/stable/objects.inv
          options:
            show_root_heading: true
            docstring_style: google
            modernize_annotations: true
            signature_crossrefs: true
  - search
  - autorefs
  - offline
  - tags

nav:
  - Home: index.md
  - Tutorials:
    - Installation: tutorials/installation.md
    - Quick Start: tutorials/quickstart.md
  - How-To Guides:
    - Batch Processing: how-to/batch.md
    - Visual QC: how-to/visual-check.md
    - Configuration: how-to/configuration.md
  - Explanation:
    - Architecture: explanation/architecture.md
    - Cell Detection: explanation/cell-detection.md
  - API Reference:
    - Pipeline: reference/pipeline.md
    - Visual Check: reference/visual-check.md
    - Configuration: reference/config.md
    - Abstract Pipeline: reference/abstract-pipeline.md
